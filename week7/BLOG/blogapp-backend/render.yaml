services:
  - type: web
    name: blogapp-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DB_URL
        sync: false   # set this manually in Render dashboard (your Atlas URI)
      - key: SECRET_KEY
        sync: false   # set this manually in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        value: dn62faa5n
      - key: CLOUDINARY_API_KEY
        value: 852712912553287
      - key: CLOUDINARY_API_SECRET
        sync: false   # set this manually in Render dashboard
      - key: FRONTEND_URL
        sync: false   # set to https://your-app.vercel.app after Vercel deploy
