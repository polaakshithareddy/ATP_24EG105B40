services:
  - type: web
    name: fullstack-backend
    env: node
    plan: free
    rootDir: week6/FULLSTACK/Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected automatically by Render — do NOT set it manually
      - key: DB_URL
        sync: false   # set in Render dashboard: your MongoDB Atlas SRV URI
      - key: JWT_SECRET
        sync: false   # set in Render dashboard: your JWT secret
      - key: FRONTEND_URL
        sync: false   # set in Render dashboard: https://your-vercel-app.vercel.app
